<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gerenciamento de Tarefas</title>
  <meta name="description" content="TaskFlow: Gerencie suas tarefas de forma visual e intuitiva com quadro Kanban estilo Trello." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header__left">
      <div class="header__logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="url(#logo-grad)" />
          <path d="M8 9h12M8 14h8M8 19h10" stroke="#fff" stroke-width="2" stroke-linecap="round" />
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
              <stop stop-color="#818cf8" />
              <stop offset="1" stop-color="#6366f1" />
            </linearGradient>
          </defs>
        </svg>
        <h1 class="header__title">TaskFlow</h1>
      </div>
    </div>
    <div class="header__right">
      <button class="btn btn--ghost" id="btn-archived" title="Ver tarefas arquivadas">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="21 8 21 21 3 21 3 8" />
          <rect x="1" y="3" width="22" height="5" />
          <line x1="10" y1="12" x2="14" y2="12" />
        </svg>
        <span>Arquivados</span>
        <span class="badge" id="archived-count" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- Board -->
  <main class="board" id="board">
    <!-- Columns will be rendered dynamically -->
  </main>

  <!-- Task Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="task-modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">Nova Tarefa</h2>
        <button class="btn btn--icon" id="modal-close" title="Fechar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <form id="task-form" class="modal__body">
        <input type="hidden" id="task-id" />
        <input type="hidden" id="task-column-id" />

        <div class="form-group">
          <label for="task-title" class="form-label">Título</label>
          <input type="text" id="task-title" class="form-input" placeholder="Nome da tarefa..." required maxlength="255" />
        </div>

        <div class="form-group">
          <label for="task-description" class="form-label">Descrição</label>
          <textarea id="task-description" class="form-input form-textarea" placeholder="Descreva a tarefa..." rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prioridade</label>
            <div class="priority-selector" id="priority-selector">
              <button type="button" class="priority-btn" data-priority="low" title="Baixa">
                <span class="priority-dot priority-dot--low"></span> Baixa
              </button>
              <button type="button" class="priority-btn active" data-priority="medium" title="Média">
                <span class="priority-dot priority-dot--medium"></span> Média
              </button>
              <button type="button" class="priority-btn" data-priority="high" title="Alta">
                <span class="priority-dot priority-dot--high"></span> Alta
              </button>
            </div>
          </div>
        </div>

        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn--primary" id="modal-submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12" />
            </svg>
            <span id="modal-submit-text">Criar Tarefa</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Archive Sidebar -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar-archived">
    <div class="sidebar__header">
      <h2 class="sidebar__title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="21 8 21 21 3 21 3 8" />
          <rect x="1" y="3" width="22" height="5" />
          <line x1="10" y1="12" x2="14" y2="12" />
        </svg>
        Tarefas Arquivadas
      </h2>
      <button class="btn btn--icon" id="sidebar-close" title="Fechar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div class="sidebar__body" id="archived-list">
      <!-- Archived tasks rendered here -->
    </div>
  </aside>

  <!-- Confirm Delete Dialog -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog" id="confirm-dialog">
      <div class="confirm-dialog__icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      </div>
      <h3 class="confirm-dialog__title" id="confirm-title">Excluir tarefa?</h3>
      <p class="confirm-dialog__message" id="confirm-message">Esta ação não pode ser desfeita.</p>
      <div class="confirm-dialog__actions">
        <button class="btn btn--secondary" id="confirm-cancel">Cancelar</button>
        <button class="btn btn--danger" id="confirm-ok">Excluir</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>

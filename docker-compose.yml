# ============================================
# TaskFlow — Docker Compose
# Nginx (reverse proxy) + Node.js + PostgreSQL
# ============================================

services:
  # --- PostgreSQL ---
  db:
    image: postgres:17-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Node.js App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_NAME: ${DB_NAME:-taskflow}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  # --- Nginx (Reverse Proxy) ---
  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
    driver: local
